<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>邀请码数据分析仪表板 - Donut Invitation Analytics</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
        'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #050816;
      padding: 24px;
      min-height: 100vh;
      color: #e2e8f0;
    }

    .container {
      max-width: 1440px;
      margin: 0 auto;
    }

    header {
      background: radial-gradient(circle at top left, #4f46e5 0, #1f2933 60%);
      padding: 24px 28px;
      border-radius: 16px;
      margin-bottom: 20px;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.8);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      color: #f9fafb;
      font-size: 24px;
      margin-bottom: 4px;
    }

    .subtitle {
      color: #cbd5f5;
      font-size: 13px;
    }

    .tag-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.45);
      color: #cbd5f5;
      border: 1px solid rgba(148, 163, 184, 0.4);
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .metric-card {
      background: radial-gradient(circle at top left, #111827 0, #020617 70%);
      padding: 16px;
      border-radius: 14px;
      box-shadow: 0 12px 20px rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.35);
      position: relative;
      overflow: hidden;
    }

    .metric-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top right, rgba(79, 70, 229, 0.18), transparent 55%);
      opacity: 0.6;
      pointer-events: none;
    }

    .metric-label {
      color: #9ca3af;
      font-size: 11px;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .metric-value {
      color: #f9fafb;
      font-size: 26px;
      font-weight: 700;
    }

    .metric-sub {
      color: #6b7280;
      font-size: 11px;
      margin-top: 4px;
    }

    .metric-positive {
      color: #4ade80;
    }

    .metric-badge {
      position: absolute;
      top: 10px;
      right: 12px;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(22, 163, 74, 0.12);
      color: #4ade80;
      border: 1px solid rgba(34, 197, 94, 0.35);
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 2.2fr 1.2fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    .card {
      background: #020617;
      padding: 18px;
      border-radius: 14px;
      box-shadow: 0 16px 30px rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(30, 64, 175, 0.45);
    }

    .card-ghost {
      background: radial-gradient(circle at top, #020617 0, #000 70%);
      border: 1px solid rgba(148, 163, 184, 0.3);
    }

    .card-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: #e5e7eb;
    }

    .card-subtitle {
      font-size: 11px;
      color: #6b7280;
    }

    .badge-muted {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid #374151;
      color: #9ca3af;
      background: rgba(17, 24, 39, 0.8);
    }

    .chart-container {
      position: relative;
      height: 260px;
    }

    .channel-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .channel-table th {
      background: #020617;
      padding: 8px 6px;
      text-align: left;
      font-size: 11px;
      color: #6b7280;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid rgba(31, 41, 55, 0.9);
    }

    .channel-table td {
      padding: 7px 6px;
      border-bottom: 1px solid rgba(31, 41, 55, 0.85);
      color: #e5e7eb;
    }

    .channel-name {
      font-weight: 500;
      color: #e5e7eb;
    }

    .channel-pill {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(59, 130, 246, 0.12);
      color: #93c5fd;
      border: 1px solid rgba(37, 99, 235, 0.4);
    }

    .progress-bar {
      background: #111827;
      height: 6px;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 4px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #4f46e5, #a855f7);
      transition: width 0.3s ease;
    }

    .wave-card {
      background: radial-gradient(circle at top left, #020617 0, #020617 70%);
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      border: 1px solid rgba(55, 65, 81, 0.9);
    }

    .wave-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .wave-name {
      font-weight: 500;
      color: #e5e7eb;
      font-size: 13px;
    }

    .wave-status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #16a34a;
      color: white;
    }

    .wave-status.in-progress {
      background: #ea580c;
    }

    .wave-status.pending {
      background: #4b5563;
      color: #e5e7eb;
    }

    .wave-stats {
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 6px;
    }

    .roi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
    }

    .roi-item {
      background: #020617;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(31, 41, 55, 0.9);
      text-align: left;
    }

    .roi-channel {
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 4px;
    }

    .roi-cac {
      font-size: 18px;
      font-weight: 700;
      color: #e5e7eb;
    }

    .roi-efficiency {
      font-size: 11px;
      margin-top: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      display: inline-block;
    }

    .roi-excellent {
      background: rgba(22, 163, 74, 0.15);
      color: #4ade80;
      border: 1px solid rgba(34, 197, 94, 0.5);
    }

    .roi-good {
      background: rgba(59, 130, 246, 0.15);
      color: #93c5fd;
      border: 1px solid rgba(59, 130, 246, 0.5);
    }

<html lang="zh-CN"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donut Page</title>
<style>

  :root {
    --bg: #070712;       /* near-black with blue tint */
    --card: #0f0f22;     /* blue-black card surface */
    --border: #1e1e3a;   /* cool dark border */
    --text: #e8e8ff;     /* off-white with slight blue tint */
    --muted: #6b6b9a;    /* blue-gray muted text */
    --accent: #9997FF;   /* Brand 01-500 */
    --accent2: #ACAAFF;  /* Brand 01-400 */
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 40px 20px;
  }
  .container { max-width: 960px; margin: 0 auto; }

  /* Bilingual */
  .en { display: none; }
  body.lang-en .zh { display: none; }
  body.lang-en .en { display: inline; }
  body.lang-en thead .en,
  body.lang-en .summary-card .en { display: block; }

  /* Lang toggle */
  .lang-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    z-index: 100;
    transition: background 0.15s;
  }
  .lang-toggle:hover { background: var(--border); }

  /* Key Dates sidebar */
  .key-dates {
    position: fixed;
    top: 56px;
    right: max(16px, calc((100vw - 960px) / 2 - 164px));
    width: 148px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    z-index: 99;
    font-size: 12px;
  }
  .key-dates h4 {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }
  .kd-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
  }
  .kd-row:last-child { border-bottom: none; }
  .kd-label { color: var(--muted); font-size: 11px; }
  .kd-date  { font-weight: 600; font-size: 12px; color: var(--text); }
  .kd-date.hot { color: var(--accent); }
  .kd-date.warn { color: var(--yellow); }
  .kd-date.red  { color: var(--red); }
  @media (max-width: 1300px) { .key-dates { display: none; } }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
  }
  .header h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }
  .header h1 span { color: var(--accent); }
  .header p { color: var(--muted); font-size: 14px; }

  /* Timeline */
  .timeline {
    display: flex;
    gap: 0;
    margin-bottom: 48px;
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .timeline-item {
    flex: 1;
    padding: 16px 12px;
    text-align: center;
    border-right: 1px solid var(--border);
    position: relative;
  }
  .timeline-item:last-child { border-right: none; }
  .timeline-item .date {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .timeline-item .label {
    font-size: 12px;
    color: var(--muted);
  }
  .timeline-item.highlight {
    background: rgba(155, 109, 255, 0.08);
  }

  /* Section */
  .section {
    margin-bottom: 40px;
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .section-num {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--accent);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    flex-shrink: 0;
  }
  .section-title {
    font-size: 20px;
    font-weight: 600;
  }
  .section-deadline {
    margin-left: auto;
    font-size: 12px;
    color: var(--yellow);
    background: rgba(234, 179, 8, 0.1);
    padding: 4px 10px;
    border-radius: 6px;
    font-weight: 500;
    white-space: nowrap;
  }

  /* Sub-section */
  .subsection {
    margin-bottom: 24px;
  }
  .subsection-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent2);
    margin-bottom: 12px;
    padding-left: 12px;
    border-left: 3px solid var(--accent2);
  }

  /* Table */
  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--card);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    margin-bottom: 16px;
  }
  thead th {
    background: rgba(255,255,255,0.03);
    padding: 10px 16px;
    text-align: left;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
  }
  tbody td {
    padding: 10px 16px;
    font-size: 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }
  td.material { font-weight: 500; }
  td.qty {
    color: var(--accent);
    font-weight: 600;
    white-space: nowrap;
  }
  td.note { color: var(--muted); font-size: 13px; }

  /* Status badges */
  .status {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 500;
  }
  .status-todo { background: rgba(255,255,255,0.06); color: var(--muted); }
  .status-wip { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .status-done { background: rgba(34,197,94,0.15); color: var(--green); }
  .status { cursor: pointer; user-select: none; }
  td.owner { font-size: 13px; color: var(--accent2); white-space: nowrap; min-width: 60px; }
  td.due   { font-size: 12px; color: var(--muted);   white-space: nowrap; min-width: 54px; }
  td.pub   { font-size: 12px; color: var(--accent);  white-space: nowrap; min-width: 54px; }
  td.link-cell {
    min-width: 36px;
    text-align: center;
    cursor: pointer;
    user-select: none;
  }
  td.link-cell:empty::before { content: '↗'; color: var(--border); font-size: 11px; }
  td.link-cell a { color: var(--accent); text-decoration: none; font-size: 13px; }
  td.link-cell[contenteditable="true"] { font-size: 11px; color: var(--muted); min-width: 120px; cursor: text; white-space: nowrap; }
  td.status-cell { white-space: nowrap; }

  /* Summary */
  .summary {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-top: 48px;
  }
  .summary h3 {
    font-size: 16px;
    margin-bottom: 16px;
    color: var(--accent);
  }
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
  }
  .summary-card {
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
  }
  .summary-card .num {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
  }
  .summary-card .label {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ---- Gantt Chart ---- */
  .gantt {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-top: 32px;
    overflow-x: auto;
  }
  .gantt h3 {
    font-size: 16px;
    margin-bottom: 20px;
    color: var(--accent);
  }
  .gantt-grid {
    min-width: 700px;
  }
  /* Date header row */
  .gantt-dates {
    display: grid;
    grid-template-columns: 160px repeat(23, 1fr);
    gap: 0;
    margin-bottom: 4px;
  }
  .gantt-dates .g-label { /* spacer */ }
  .gantt-dates .g-date {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    padding: 4px 0;
    border-left: 1px solid var(--border);
  }
  .gantt-dates .g-date.milestone {
    color: var(--accent);
    font-weight: 600;
  }
  /* Rows */
  .gantt-row {
    display: grid;
    grid-template-columns: 160px repeat(23, 1fr);
    gap: 0;
    align-items: center;
    height: 36px;
    border-top: 1px solid var(--border);
  }
  .gantt-row:last-child { border-bottom: 1px solid var(--border); }
  .g-task {
    font-size: 13px;
    font-weight: 500;
    padding-right: 12px;
    white-space: nowrap;
  }
  .g-cell {
    height: 100%;
    border-left: 1px solid var(--border);
    position: relative;
  }
  .g-cell.milestone-col {
    border-left: 1px dashed rgba(155,109,255,0.25);
  }
  /* Bar */
  .g-bar {
    position: absolute;
    top: 8px;
    bottom: 8px;
    left: 0;
    right: 0;
    border-radius: 4px;
    opacity: 0.85;
  }
  .g-bar.purple { background: var(--accent); }
  .g-bar.purple-light { background: var(--accent2); opacity: 0.5; }
  .g-bar.green { background: var(--green); }
  .g-bar.yellow { background: var(--yellow); }
  .g-bar.red { background: var(--red); opacity: 0.7; }
  /* Bar spanning: use grid-column on parent .g-cell */
  .bar-span { position: relative; }
  .bar-span .g-bar {
    position: absolute;
    top: 8px;
    bottom: 8px;
    border-radius: 4px;
  }

  /* Save indicator */
  #save-indicator {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 18px;
    font-size: 12px;
    color: var(--green);
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 200;
    pointer-events: none;
  }
  #save-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--card);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 8px 16px;
    z-index: 200;
    font-size: 12px;
    color: var(--muted);
  }
  #save-bar button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  #save-bar button:hover { opacity: 0.85; }
  #save-bar .secondary {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  /* Editable hint */
  [contenteditable]:focus {
    outline: 1px dashed var(--accent);
    outline-offset: 2px;
    border-radius: 4px;
  }
  .edit-hint {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 32px;
    opacity: 0.6;
  }

  /* Checkbox */
  input[type="checkbox"] {
    accent-color: var(--accent);
    width: 14px;
    height: 14px;
    cursor: pointer;
  }

  /* Print */
  @media print {
    body { background: #fff; color: #000; }
    .edit-hint, .lang-toggle { display: none; }
    table, .timeline, .summary, .gantt { border-color: #ddd; }
  }
